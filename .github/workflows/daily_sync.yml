name: Daily Garmin BIA Sync

on:
  schedule:
    # 11:00 IST (05:30 UTC) — GitHub cron is always UTC
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Garmin BIA sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          TELEGRAM_LEGACY_REPORT: ${{ vars.TELEGRAM_LEGACY_REPORT }}
          USER_HEIGHT_CM: ${{ vars.USER_HEIGHT_CM }}
          WEIGHT_TARGET_MIN_KG: ${{ vars.WEIGHT_TARGET_MIN_KG }}
          WEIGHT_TARGET_MAX_KG: ${{ vars.WEIGHT_TARGET_MAX_KG }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_ANALYSIS_ENABLED: ${{ vars.GEMINI_ANALYSIS_ENABLED }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          ANALYSIS_LOOKBACK_DAYS: ${{ vars.ANALYSIS_LOOKBACK_DAYS }}
          USER_GOAL: ${{ vars.USER_GOAL }}
          GMAIL_OAUTH_JSON: ${{ secrets.GMAIL_OAUTH_JSON }}
        run: python -m garmin_bia_sync
